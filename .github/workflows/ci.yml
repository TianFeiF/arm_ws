name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: colcon build + test (humble)
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install apt dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-humble-moveit \
            ros-humble-moveit-planners \
            ros-humble-moveit-configs-utils \
            ros-humble-moveit-resources \
            ros-humble-moveit-visual-tools \
            ros-humble-moveit-servo \
            ros-humble-moveit-setup-assistant \
            ros-humble-moveit-task-constructor-core \
            ros-humble-srdfdom \
            ros-humble-launch-param-builder \
            ros-humble-ros2-control \
            ros-humble-ros2-controllers \
            ros-humble-controller-manager \
            ros-humble-joint-state-broadcaster \
            ros-humble-joint-trajectory-controller \
            libethercat-dev \
            pkg-config \
            python3-colcon-common-extensions \
            python3-rosdep \
            git build-essential cmake
          rm -rf /var/lib/apt/lists/*

      - name: rosdep
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          [ -f /etc/ros/rosdep/sources.list.d/20-default.list ] || rosdep init
          rosdep update --rosdistro humble
          rosdep install --from-paths src --ignore-src -r -y --rosdistro humble || true

      - name: colcon build
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install \
                       --cmake-args -DCMAKE_BUILD_TYPE=Release \
                       --event-handlers console_direct+

      - name: colcon test
        shell: bash
        run: |
          set -euo pipefail
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-test-logs
          path: |
            log/latest_test/
            build/*/test_results/

  lint:
    name: ament_lint (python + xml + cmake)
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-humble-ament-flake8 \
            ros-humble-ament-pep257 \
            ros-humble-ament-xmllint \
            ros-humble-ament-cmake-lint-cmake \
            ros-humble-ament-cmake-copyright
          rm -rf /var/lib/apt/lists/*

      - name: flake8 (Python style)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          # Restrict to our packages; vendored ethercat_driver_ros2 is upstream.
          ament_flake8 src/armv7_description src/armv7_moveit_config src/armv7_bringup

      - name: xmllint (package.xml + URDF)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ament_xmllint src/armv7_description src/armv7_moveit_config src/armv7_bringup

      - name: lint_cmake
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ament_cmake_lint_cmake src/armv7_description src/armv7_moveit_config src/armv7_bringup

  shellcheck:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          additional_files: ./init_and_push_to_github.sh
          severity: warning
